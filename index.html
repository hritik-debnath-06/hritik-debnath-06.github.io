<!DOCTYPE html>
<html>
<head>
<style>
@import url('https://fonts.googleapis.com/css?family=Roboto|Lato:300');

:root {
  --main-font: 'Roboto', sans-serif;
  --title-font: 'Lato', sans-serif;
}

h1, h2, h3, h4, h5, h6 {
  font-family: var(--title-font);
  font-weight: 300;
}

html, body {
  font-family: var(--main-font);
  margin: 0;
  width: 100%;
  height: 100%;
  background-color: #fff;
}

/* Loading Screen Container */
#load_screen {
  background: #fff;
  position: fixed;
  z-index: 100;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: opacity 1s ease-out; /* Smooth fade out at the end */
}

#loading {
  text-align: center;
  width: 100%;
}

/* The Title Text */
#pre_title {
  opacity: 0; /* Starts hidden, script will fade it in */
  letter-spacing: 20px; /* Reduced from 50px so it fits better */
  transition: all 2s ease;
  margin-bottom: 20px;
}

/* The SVG Pyramid */
.pyramid {
  width: 350px;
  height: auto;
  display: block;
  margin: 0 auto;
}

/* The Orb Animation */
.blobs {
  position: relative;
  height: 50px;
}

.blob {
  position: absolute;
  left: 50%;
  width: 15px;
  height: 15px;
  background: #000;
  border-radius: 100%;
  transform: translateX(-50%);
  animation: center_orb 3s infinite ease-in-out;
}

@keyframes center_orb {
  0%, 100% { top: 0px; opacity: 0.3; transform: translateX(-50%) scale(0.8); }
  50% { top: 25px; opacity: 1; transform: translateX(-50%) scale(1.2); }
}
</style>
</head>
<body>

  <div id="load_screen">
    <div id="loading">
      <h1 id="pre_title">CALL IT MAGIC</h1>
      
      <svg class="pyramid" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 792 612">
        <path d="M533.7 342.3l-81.3 155.3 -66-364L533.7 342.3zM386.3 133.7l-182 260 248 104" style="fill:none;stroke-linejoin:round;stroke-width:2;stroke:#231F20" />
        <path d="M386.3 348.3l147.3-6 -329.3 51.3L386.3 348.3zM386.3 133.7v214.7l66 149.3" style="fill:none;stroke-linejoin:round;stroke-width:0.5;stroke:#231F20" />
      </svg>

      <div class="blobs">
        <div class="blob"></div>
      </div>
    </div>
  </div>

  <div style="padding: 50px; text-align: center;">
    <h1>Hello from Hritik!!!</h1>
  </div>

  <script src="https://cdn.jsdelivr.net/walkway/0.0.1/walkway.min.js"></script>
  <script src="https://code.jquery.com/jquery-1.12.0.min.js"></script>

  <script>
    $(window).on('load', function() {
      // 1. Initialize Walkway on the SVG
      var svg = new Walkway({
        selector: '.pyramid',
        duration: '2000',
        easing: 'easeInOutCubic'
      });

      // 2. Start drawing the SVG
      svg.draw(function() {
        // 3. Once drawing is done, fade in the Title
        $('#pre_title').css({
          'opacity': '1',
          'letter-spacing': '10px'
        });

        // 4. Finally, fade out the whole load screen after a short delay
        setTimeout(function() {
          $('#load_screen').css('opacity', '0');
          setTimeout(function() {
            $('#load_screen').hide();
          }, 1000);
        }, 1500);
      });
    });
  </script>
</body>
</html>
